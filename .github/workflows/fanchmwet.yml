name: Build OpenWrt from xsj520/x xx.zip Source

on:
  workflow_dispatch:    # 手动触发编译
  push:
    branches: [ main ]  # 推送到main自动编译（可删除）

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout current repo (xsj520/x)
        uses: actions/checkout@v4
        with:
          repository: xsj520/x  # 明确指定你的仓库，确保拉取正确
          ref: main

      # 安装OpenWrt编译依赖
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
          git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev \
          libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
          libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3-pyelftools \
          python3-pip qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip \
          vim wget xmlto xxd zlib1g-dev

      # 🔴 核心步骤：直接解压你仓库里的 xx.zip 源码（绝对能拿到）
      - name: Unzip xx.zip from xsj520/x repo
        run: |
          # 确认xx.zip存在，打印信息方便排查
          ls -la
          unzip -q xx.zip -d openwrt
          # 自动处理zip套一层文件夹的情况（99%的源码包都兼容）
          if [ -d "openwrt/$(ls openwrt | head -n1)" ]; then
            mv openwrt/$(ls openwrt | head -n1)/* openwrt/
            rm -rf openwrt/$(ls openwrt | head -n1)
          fi

      # 🟢 核心：把你的 30000m.config 设为编译配置
      - name: Apply custom config (3000m.config -> .config)
        run: |
          cp 3000m.config openwrt/.config

      # 🟡 执行DIY1.sh
      - name: Run DIY1.sh
        run: |
          chmod +x DIY1.sh
          cp DIY1.sh openwrt/
          cd openwrt && ./DIY1.sh

      # 🟡 执行DIY2.sh
      - name: Run DIY2.sh
        run: |
          chmod +x DIY2.sh
          cp DIY2.sh openwrt/
          cd openwrt && ./DIY2.sh

      # 更新feeds
      - name: Update & install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 预下载依赖包
      - name: Download all packages
        run: |
          cd openwrt
          make download -j$(nproc)

      # 正式编译（失败自动单线程重试）
      - name: Compile OpenWrt firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      # 上传编译好的固件
      - name: Upload compiled firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-Firmware
          path: |
            openwrt/bin/targets/*/*
            !openwrt/bin/targets/*/*/packages
