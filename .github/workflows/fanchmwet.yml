name: Build OpenWrt from ZIP source

on:
  workflow_dispatch:        # 手动触发
  repository_dispatch:      # 也支持 API 触发

env:
  # 你的压缩包所在仓库信息
  REPO_OWNER: xsj520
  REPO_NAME: x
  REPO_BRANCH: main
  SOURCE_ZIP: xx.zip        # 压缩包文件名

  # 自定义配置文件（如果你的仓库中有这些文件）
  CONFIG_FILE: 3000m.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh

  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout (for config files & scripts)
        uses: actions/checkout@v4

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev gawk git libssl-dev gettext \
            zlib1g-dev unzip wget file python3 python3-pip python3-ply python3-docutils \
            rsync subversion ccache libtool autoconf automake bc xsltproc

      - name: Download source zip file
        run: |
          mkdir -p /mnt/workdir
          cd /mnt/workdir
          # 从 GitHub raw 链接下载 zip
          wget https://raw.githubusercontent.com/${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}/${{ env.REPO_BRANCH }}/${{ env.SOURCE_ZIP }}
          ls -la

      - name: Extract source code
        run: |
          cd /mnt/workdir
          unzip -q ${{ env.SOURCE_ZIP }}
          # 查看解压后的内容
          echo "解压后的目录结构："
          ls -la
          # 尝试找到真正的源码根目录（包含 Makefile 和 include 等）
          # 如果压缩包内直接是源码文件（没有外层目录），则直接重命名为 openwrt
          # 如果解压后得到一个子目录（例如 openwrt-src/），则将其重命名为 openwrt
          if [ -f Makefile ] && [ -d include ] && [ -d scripts ]; then
            # 当前目录已经是源码根目录
            mv . ../openwrt_tmp
            cd ..
            rm -rf workdir
            mv openwrt_tmp workdir
          else
            # 查找包含 Makefile 和 include 的目录
            SRCDIR=$(find . -maxdepth 2 -type f -name Makefile -exec dirname {} \; | head -1)
            if [ -n "$SRCDIR" ] && [ -d "$SRCDIR/include" ]; then
              mv "$SRCDIR" openwrt
            else
              echo "错误：无法找到 OpenWrt 源码根目录（缺少 Makefile 或 include）"
              exit 1
            fi
          fi
          cd openwrt
          pwd && ls -la

      - name: Link workspace
        run: |
          ln -sf /mnt/workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy custom config file
        working-directory: openwrt
        run: |
          if [ -f "$GITHUB_WORKSPACE/${{ env.CONFIG_FILE }}" ]; then
            cp "$GITHUB_WORKSPACE/${{ env.CONFIG_FILE }}" .config
            echo "使用自定义配置文件 ${{ env.CONFIG_FILE }}"
          else
            echo "未找到配置文件，使用默认配置 (make defconfig)"
            make defconfig
          fi

      - name: Run diy-part1.sh (pre-download)
        working-directory: openwrt
        run: |
          if [ -f "$GITHUB_WORKSPACE/${{ env.DIY_P1_SH }}" ]; then
            chmod +x "$GITHUB_WORKSPACE/${{ env.DIY_P1_SH }}"
            "$GITHUB_WORKSPACE/${{ env.DIY_P1_SH }}"
          fi

      - name: Download package sources
        working-directory: openwrt
        run: |
          make download -j8
          # 清理下载失败的空文件
          find dl -size -1024c -exec rm -f {} \;

      - name: Run diy-part2.sh (post-download)
        working-directory: openwrt
        run: |
          if [ -f "$GITHUB_WORKSPACE/${{ env.DIY_P2_SH }}" ]; then
            chmod +x "$GITHUB_WORKSPACE/${{ env.DIY_P2_SH }}"
            "$GITHUB_WORKSPACE/${{ env.DIY_P2_SH }}"
          fi

      - name: Compile firmware
        working-directory: openwrt
        run: |
          make -j$(nproc) || make -j1 V=s

      - name: Prepare artifacts
        id: artifacts
        working-directory: openwrt
        run: |
          # 生成时间戳
          echo "DATE=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV
          # 查找固件输出目录
          FIRMWARE_PATH=$(find bin/targets -name "*.bin" -printf "%h\n" | head -1)
          if [ -n "$FIRMWARE_PATH" ]; then
            echo "FIRMWARE_PATH=$FIRMWARE_PATH" >> $GITHUB_ENV
          fi

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware-${{ env.DATE }}
          path: openwrt/bin/targets/**/*
        if: always()
